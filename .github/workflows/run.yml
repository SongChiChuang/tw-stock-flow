name: Auto Run Stock System

on:

  schedule:

    # 台灣時間 16:00 開始
    - cron: "0 8 * * *"

    # 台灣時間 16:30
    - cron: "30 8 * * *"

    # 台灣時間 17:00
    - cron: "0 9 * * *"

    # 台灣時間 17:30
    - cron: "30 9 * * *"

    # 台灣時間 18:00
    - cron: "0 10 * * *"

    # 18:00~21:00 每10分鐘

    - cron: "10 10 * * *"
    - cron: "20 10 * * *"
    - cron: "30 10 * * *"
    - cron: "40 10 * * *"
    - cron: "50 10 * * *"

    - cron: "0 11 * * *"
    - cron: "10 11 * * *"
    - cron: "20 11 * * *"
    - cron: "30 11 * * *"
    - cron: "40 11 * * *"
    - cron: "50 11 * * *"

    - cron: "0 12 * * *"
    - cron: "10 12 * * *"
    - cron: "20 12 * * *"
    - cron: "30 12 * * *"
    - cron: "40 12 * * *"
    - cron: "50 12 * * *"

  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      # ====================================
      # Checkout Repository
      # ====================================

      - name: Checkout code
        uses: actions/checkout@v3

      # ====================================
      # Setup Python
      # ====================================

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ====================================
      # Install Dependencies
      # ====================================

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ====================================
      # Run Main System
      # ====================================

      - name: Run main.py
        run: python main.py

      # ====================================
      # Commit Reports
      # ====================================

      - name: Commit files
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "auto update stock data"

          git push
