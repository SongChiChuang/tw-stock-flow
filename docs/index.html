
<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TW Stock Flow Dashboard</title>

<style>

body {
    background: #050816;
    color: white;
    font-family: Arial;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #00ff99;
    font-size: 56px;
    margin-bottom: 10px;
}

.subtitle {
    color: #888;
    margin-bottom: 40px;
}

.card {
    background: #111827;
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 40px;
    overflow-x: auto;
}

h2 {
    font-size: 42px;
    margin-bottom: 24px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    color: #00ff99;
    font-size: 28px;
    padding: 18px;
    border-bottom: 1px solid #333;
}

td {
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #222;
    font-size: 28px;
}

@media screen and (max-width: 768px) {

    h1 {
        font-size: 28px;
    }

    h2 {
        font-size: 22px;
    }

    th {
        font-size: 16px;
        padding: 10px;
    }

    td {
        font-size: 16px;
        padding: 12px;
    }

}

</style>

</head>

<body>

<h1>TW Stock Flow Dashboard</h1>

<div class="subtitle">
每日自動更新
</div>


        <div class="card">
            <h2>外資買超 TOP30</h2>
            <p>無資料</p>
        </div>
        


        <div class="card">
            <h2>外資賣超 TOP30</h2>
            <p>無資料</p>
        </div>
        


        <div class="card">
            <h2>投信買超 TOP30</h2>
            <p>無資料</p>
        </div>
        


        <div class="card">
            <h2>投信賣超 TOP30</h2>
            <p>無資料</p>
        </div>
        

</body>
</html>
