<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TW Stock Flow Dashboard</title>

    <style>

        body{
            background:#0d1117;
            color:white;
            font-family:Arial;
            margin:0;
            padding:20px;
        }

        h1{
            color:#00ff99;
        }

        h2{
            margin-top:40px;
            color:#ffffff;
        }

        .card{
            background:#161b22;
            border-radius:16px;
            padding:20px;
            margin-bottom:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            color:#00ff99;
            border-bottom:1px solid #333;
            padding:12px;
            text-align:left;
        }

        td{
            padding:12px;
            border-bottom:1px solid #222;
        }

        tr:hover{
            background:#1f2937;
        }

        .update-time{
            color:#888;
            margin-bottom:30px;
        }

    </style>
</head>

<body>

    <h1>TW Stock Flow Dashboard</h1>

    <div class="update-time">
        每日自動更新
    </div>

    <!-- 外資買超 -->
    <div class="card">
        <h2>外資買超 TOP30</h2>

        <table id="foreign-buy-table">
            <thead>
                <tr>
                    <th>排名</th>
                    <th>股票代號</th>
                    <th>股票名稱</th>
                    <th>買賣超</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>
    </div>

    <!-- 外資賣超 -->
    <div class="card">
        <h2>外資賣超 TOP30</h2>

        <table id="foreign-sell-table">
            <thead>
                <tr>
                    <th>排名</th>
                    <th>股票代號</th>
                    <th>股票名稱</th>
                    <th>買賣超</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>
    </div>

    <!-- 投信買超 -->
    <div class="card">
        <h2>投信買超 TOP30</h2>

        <table id="trust-buy-table">
            <thead>
                <tr>
                    <th>排名</th>
                    <th>股票代號</th>
                    <th>股票名稱</th>
                    <th>買賣超</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>
    </div>

    <!-- 投信賣超 -->
    <div class="card">
        <h2>投信賣超 TOP30</h2>

        <table id="trust-sell-table">
            <thead>
                <tr>
                    <th>排名</th>
                    <th>股票代號</th>
                    <th>股票名稱</th>
                    <th>買賣超</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>
    </div>

<script>

async function loadCSV(path, tableId){

    const response = await fetch(path);

    const text = await response.text();

    const rows = text.trim().split("\n");

    const tbody = document.querySelector(`#${tableId} tbody`);

    tbody.innerHTML = "";

    for(let i = 1; i < rows.length; i++){

        const cols = rows[i].split(",");

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${i}</td>
            <td>${cols[0] || ""}</td>
            <td>${cols[1] || ""}</td>
            <td>${cols[2] || ""}</td>
        `;

        tbody.appendChild(tr);
    }
}

async function init(){

    const today = "20260513";

    await loadCSV(
        `../reports/heatmap/${today}_foreign_buy_30.csv`,
        "foreign-buy-table"
    );

    await loadCSV(
        `../reports/heatmap/${today}_foreign_sell_30.csv`,
        "foreign-sell-table"
    );

    await loadCSV(
        `../reports/heatmap/${today}_trust_buy_30.csv`,
        "trust-buy-table"
    );

    await loadCSV(
        `../reports/heatmap/${today}_trust_sell_30.csv`,
        "trust-sell-table"
    );
}

init();

</script>

</body>
</html>
